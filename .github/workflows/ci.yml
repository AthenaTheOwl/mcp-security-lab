name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: mcp-security-lab
      - name: Check out athena-site (sibling repo for MCP surface gate)
        uses: actions/checkout@v6
        with:
          repository: AthenaTheOwl/athena-site
          path: athena-site
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install python deps
        working-directory: mcp-security-lab
        run: python -m pip install -e ".[dev]"
      - name: Tests
        working-directory: mcp-security-lab
        run: python -m pytest
      - name: Voice lint
        working-directory: mcp-security-lab
        run: python scripts/voice_lint.py
      - name: check_no_bom
        working-directory: mcp-security-lab
        run: python scripts/check_no_bom.py
      - name: Sensitive disclosure gate
        working-directory: mcp-security-lab
        run: python scripts/validate_sensitive_disclosures.py
      - name: Spec check
        working-directory: mcp-security-lab
        run: python scripts/spec_check.py
      - name: Validate decisions
        working-directory: mcp-security-lab
        run: python scripts/validate_decisions.py
      - name: Validate roles
        working-directory: mcp-security-lab
        run: python scripts/validate_roles.py
      - name: Validate tools
        working-directory: mcp-security-lab
        run: python scripts/validate_tools.py
      - name: Validate policies
        working-directory: mcp-security-lab
        run: python scripts/validate_policies.py
      - name: Validate skills
        working-directory: mcp-security-lab
        run: python scripts/validate_skills.py
      - name: Validate dreams
        working-directory: mcp-security-lab
        run: python scripts/validate_dreams.py
      - name: Schema cache freshness
        working-directory: mcp-security-lab
        run: python scripts/check_schema_cache_freshness.py
      - name: Install athena-mcp-server deps
        working-directory: athena-site/apps/mcp-server
        run: npm install --no-audit --no-fund
      # Drift gate: iterate every enabled MCP server in
      # config/mcp_server_registry.yaml and compare each one's committed
      # tool-surface snapshot against the regenerated live surface.
      # Adding a new MCP server to this gate is a registry-append; the
      # workflow does not need to change.
      - name: Validate registered MCP server tool surfaces
        working-directory: mcp-security-lab
        env:
          ATHENA_SITE_REPO: ${{ github.workspace }}/athena-site
        run: python scripts/validate_mcp_surface.py --all
      - name: Example scan
        working-directory: mcp-security-lab
        run: python -m mcp_security_lab scan examples/claude-desktop-config.json --out reports/ci-example.json
