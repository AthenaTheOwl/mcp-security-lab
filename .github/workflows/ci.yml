name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest
      - name: Voice lint
        run: python scripts/voice_lint.py
      - name: Spec check
        run: python scripts/spec_check.py
      - name: Example scan
        run: python -m mcp_security_lab scan examples/claude-desktop-config.json --out reports/ci-example.json

