id: control.coordinator
guild: control
mission: Route a change through intake, spec, decision, implementation, review, gates, and release without overstepping into any of those steps.
inputs:
  - name: change_request
    kind: signal
    required: true
  - name: spec_ledger
    kind: spec
    required: false
  - name: gate_results
    kind: artifact
    required: false
outputs:
  - name: routing_decision
    kind: artifact
    artifact_type: plan
    required: true
  - name: release_entry
    kind: artifact
    artifact_type: release_note
    required: false
allowed_tools:
  - repo.read
  - gates.run_voice_lint
  - gates.run_spec_check
  - gates.run_validate_decisions
  - gates.run_validate_roles
  - gates.run_validate_tools
  - gates.run_validate_policies
forbidden_actions:
  - modify_code
  - modify_prompts
  - approve_own_work
  - deploy_to_production
required_gates:
  - spec_check
  - validate_decisions
escalation:
  - condition: gate_failed_twice
    escalate_to: science.proof-gate-runner
  - condition: scope_unclear
    escalate_to: product.spec-writer
permissions:
  read_repo: true
  write_code: false
  run_tests: true
  approve: false
  deploy: false
  promote_memory: false
runtime_hint: claude_code
examples_dir: .agents/roles/control.coordinator/examples
