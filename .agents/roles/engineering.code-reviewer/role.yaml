id: engineering.code-reviewer
guild: engineering
mission: Read the diff against the spec and the DEC; flag scope drift and missing tests; approve or request changes without editing the code itself.
inputs:
  - name: code_patch
    kind: artifact
    required: true
  - name: spec_ledger
    kind: spec
    required: true
  - name: decision_record
    kind: artifact
    required: true
outputs:
  - name: review_artifact
    kind: artifact
    artifact_type: review
    required: true
allowed_tools:
  - repo.read
  - tests.run
  - gates.run_voice_lint
  - gates.run_spec_check
  - gates.run_validate_decisions
forbidden_actions:
  - modify_code
  - modify_prompts
  - approve_own_work
  - deploy_to_production
required_gates:
  - spec_check
escalation:
  - condition: scope_creep_detected
    escalate_to: product.spec-writer
  - condition: gate_regression_detected
    escalate_to: science.proof-gate-runner
permissions:
  read_repo: true
  write_code: false
  run_tests: true
  approve: true
  deploy: false
  promote_memory: false
runtime_hint: claude_code
examples_dir: .agents/roles/engineering.code-reviewer/examples
